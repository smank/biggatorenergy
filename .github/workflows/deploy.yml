name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh-keyscan -t ed25519 ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/key smank@${{ secrets.DEPLOY_HOST }} 'cd /srv/biggatorenergy && git pull && docker build -t biggatorenergy . && docker stop biggatorenergy; docker rm biggatorenergy; docker run -d --name biggatorenergy --restart unless-stopped --network proxy -p 3333:80 biggatorenergy && docker image prune -f'
