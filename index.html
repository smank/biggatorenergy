<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🐊</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230a0a12' width='180' height='180'/><text x='90' y='140' font-size='140' text-anchor='middle'>🐊</text></svg>">

  <!-- JSON-LD: schema.org CreativeWork for richer search previews -->
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"CreativeWork","name":"Big Gator Energy","url":"https://biggatorenergy.com/","description":"A persistent pixel art swamp simulator. Alligators live, hunt, breed, and die. Seasons pass. UFOs abduct. Every seed is a different ecosystem.","inLanguage":"en","genre":"Simulation","author":{"@type":"Person","name":"smank"}}
  </script>
</head>
<body>
  <h1 class="sr-only">Big Gator Energy — Pixel Art Swamp Simulator</h1>
  <canvas id="game"
          role="img"
          aria-label="Pixel art alligator swamp simulator. Alligators, wildlife, and weather unfold in real time.">
  </canvas>
  <div id="start-overlay" role="button" tabindex="0" aria-label="Click or press Enter to enter the swamp">
    <div id="start-text">click to enter the swamp</div>
  </div>

  <div id="title-screen" class="title-overlay hidden" role="dialog" aria-labelledby="title-heading">
    <div class="title-vignette title-vignette-top"></div>
    <div class="title-vignette title-vignette-bottom"></div>

    <!-- Background decoration dots — low-opacity party stickers -->
    <div class="title-dot title-dot-1" aria-hidden="true"></div>
    <div class="title-dot title-dot-2" aria-hidden="true"></div>
    <div class="title-dot title-dot-3" aria-hidden="true"></div>
    <div class="title-dot title-dot-4" aria-hidden="true"></div>
    <div class="title-dot title-dot-5" aria-hidden="true"></div>
    <div class="title-dot title-dot-6" aria-hidden="true"></div>
    <div class="title-dot title-dot-7" aria-hidden="true"></div>
    <div class="title-dot title-dot-8" aria-hidden="true"></div>

    <div class="title-inner">
      <div class="title-header">
        <div class="title-big" id="title-heading">BIG GATOR ENERGY</div>
        <div class="title-sub">a persistent pixel art swamp</div>
      </div>

      <div id="title-main" class="title-menu">
        <div class="title-row">
          <button type="button" class="title-btn" data-action="dynasty">
            <span class="title-btn-main">dynasty</span>
            <span class="title-btn-sub">one bloodline · permadeath</span>
          </button>
          <button type="button" class="title-info" data-info="dynasty" aria-label="About dynasty mode">?</button>
        </div>
        <div class="title-row">
          <button type="button" class="title-btn" data-action="terrarium">
            <span class="title-btn-main">terrarium</span>
            <span class="title-btn-sub">no stakes · just vibes</span>
          </button>
          <button type="button" class="title-info" data-info="terrarium" aria-label="About terrarium mode">?</button>
        </div>
      </div>

      <div id="title-info-popover" class="title-info-popover hidden" role="dialog" aria-live="polite">
        <div class="title-info-heading" id="title-info-heading"></div>
        <div class="title-info-body" id="title-info-body"></div>
        <button type="button" class="title-info-close" data-action="info-close">close</button>
      </div>

      <div id="title-terrarium-submenu" class="title-menu hidden">
        <div class="title-section-label">terrarium mode</div>
        <button type="button" class="title-btn" data-action="terrarium-continue">
          <span class="title-btn-main">continue</span>
          <span class="title-btn-sub" id="terrarium-continue-sub">your existing swamp</span>
        </button>
        <button type="button" class="title-btn" data-action="terrarium-new">
          <span class="title-btn-main">new swamp</span>
          <span class="title-btn-sub">fresh seed · different terrain</span>
        </button>
        <button type="button" class="title-back" data-action="back">back</button>
      </div>

      <div id="title-dynasty-submenu" class="title-menu hidden">
        <div class="title-section-label">dynasty mode</div>
        <button type="button" class="title-btn" data-action="dynasty-continue">
          <span class="title-btn-main">continue</span>
          <span class="title-btn-sub" id="dynasty-continue-sub">your bloodline</span>
        </button>
        <button type="button" class="title-btn" data-action="dynasty-new">
          <span class="title-btn-main">new dynasty</span>
          <span class="title-btn-sub">fresh founders · fresh swamp</span>
        </button>
        <button type="button" class="title-back" data-action="back">back</button>
      </div>

      <div class="title-meta-links">
        <button type="button" class="title-vault-link" id="title-vault-btn">vault</button>
        <button type="button" class="title-vault-link" id="title-ach-btn">achievements</button>
      </div>

      <div class="title-footer">biggatorenergy.com</div>
    </div>
  </div>

  <div id="founding-pair" class="bge-overlay hidden" role="dialog" aria-labelledby="founding-title">
    <div class="bge-card">
      <!-- corner doodle: sparkle -->
      <svg class="bge-doodle bge-doodle-tr" aria-hidden="true" viewBox="0 0 24 24" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2 L13.5 10 L21 12 L13.5 14 L12 22 L10.5 14 L3 12 L10.5 10 Z" fill="#ddaa30" opacity="0.75"/>
      </svg>
      <h2 id="founding-title">your founders</h2>
      <div id="founding-dynasty-name"></div>
      <div id="founding-pair-grid"></div>
      <div class="bge-row">
        <button type="button" class="bge-btn bge-btn-small" id="founding-reroll">reroll (<span id="founding-rerolls">5</span>)</button>
        <button type="button" class="bge-btn bge-btn-small bge-btn-primary" id="founding-begin">begin dynasty</button>
      </div>
    </div>
  </div>

  <div id="game-over" class="bge-overlay hidden" role="dialog" aria-labelledby="game-over-title">
    <div class="bge-card">
      <!-- corner doodle: squiggle -->
      <svg class="bge-doodle bge-doodle-tr" aria-hidden="true" viewBox="0 0 32 16" width="32" height="16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 8 Q6 2 10 8 Q14 14 18 8 Q22 2 26 8 Q30 14 32 8" stroke="#44a8b4" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      </svg>
      <h2 id="game-over-title">the bloodline is gone</h2>
      <div id="game-over-stats"></div>
      <div id="game-over-postmortem" class="game-over-postmortem"></div>
      <div id="game-over-achievements" class="game-over-achievements hidden"></div>
      <div class="bge-row">
        <button type="button" class="bge-btn bge-btn-small" id="game-over-terrarium">watch the swamp</button>
        <button type="button" class="bge-btn bge-btn-small bge-btn-primary" id="game-over-restart">new dynasty</button>
      </div>
      <div class="game-over-footer-links">
        <button type="button" class="bge-vault-link" id="game-over-vault-btn">vault</button>
        <button type="button" class="bge-vault-link" id="game-over-ach-btn">achievements</button>
      </div>
    </div>
  </div>
  <div id="unlocks-shop" class="bge-overlay hidden" role="dialog" aria-labelledby="unlocks-shop-title" aria-modal="true">
    <div class="bge-card unlocks-card">
      <!-- corner doodle: tiny gator eye -->
      <svg class="bge-doodle bge-doodle-tr" aria-hidden="true" viewBox="0 0 24 18" width="24" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="12" cy="10" rx="10" ry="7" fill="#2a4a2e" opacity="0.8"/>
        <ellipse cx="12" cy="10" rx="10" ry="7" stroke="#6aaa5a" stroke-width="1.5" opacity="0.6"/>
        <ellipse cx="12" cy="10" rx="4" ry="6" fill="#1a0a06" opacity="0.9"/>
        <ellipse cx="10.5" cy="8" rx="1.5" ry="1.5" fill="#ffffff" opacity="0.5"/>
        <!-- little brow bumps -->
        <path d="M4 5 Q8 2 12 4 Q16 2 20 5" stroke="#6aaa5a" stroke-width="1.2" stroke-linecap="round" opacity="0.5" fill="none"/>
      </svg>
      <h2 id="unlocks-shop-title">vault</h2>
      <div class="unlocks-balance" id="unlocks-balance">0 lineage points</div>
      <div class="unlocks-list" id="unlocks-list"></div>
      <div class="unlocks-feedback" id="unlocks-feedback"></div>
      <button type="button" class="bge-vault-link" id="unlocks-close">close</button>
    </div>
  </div>

  <!-- Achievements overlay -->
  <div id="achievements-overlay" class="bge-overlay hidden" role="dialog" aria-labelledby="achievements-overlay-title" aria-modal="true">
    <div class="bge-card achievements-card">
      <!-- corner doodle: star -->
      <svg class="bge-doodle bge-doodle-tr" aria-hidden="true" viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2 L14 9 L21 9 L15.5 14 L17.5 21 L12 17 L6.5 21 L8.5 14 L3 9 L10 9 Z" fill="#ddaa30" opacity="0.7"/>
      </svg>
      <h2 id="achievements-overlay-title">achievements</h2>
      <div id="achievements-panel"><!-- populated by renderAchievementsPanel --></div>
      <button type="button" class="bge-vault-link" id="achievements-close">close</button>
    </div>
  </div>

  <div id="inspector-overlay" class="bge-overlay hidden" role="dialog" aria-labelledby="inspector-card" aria-modal="true">
    <div class="bge-card inspector-card" id="inspector-card">
      <!-- populated by inspector.js -->
    </div>
  </div>

  <div id="era-celebration" class="era-celebration hidden" role="status" aria-live="polite">
    <div class="era-cel-numeral"></div>
    <div class="era-cel-name"></div>
    <div class="era-cel-flavor"></div>
  </div>

  <!-- First-dynasty intro tutorial (shown once, after founders commit) -->
  <div id="intro-tutorial" class="bge-overlay hidden" role="dialog" aria-labelledby="intro-card-header" aria-modal="true">
    <div class="bge-card intro-tutorial-card">
      <!-- corner doodle: mustard squiggle dots -->
      <svg class="bge-doodle bge-doodle-tr" aria-hidden="true" viewBox="0 0 28 10" width="28" height="10" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="4"  cy="5" r="3" fill="#ddaa30" opacity="0.75"/>
        <circle cx="14" cy="5" r="3" fill="#ddaa30" opacity="0.55"/>
        <circle cx="24" cy="5" r="3" fill="#ddaa30" opacity="0.35"/>
      </svg>
      <div class="intro-card-content">
        <div class="intro-card-header" id="intro-card-header"></div>
        <div class="intro-card-body"></div>
      </div>
      <div class="bge-row intro-card-footer">
        <div class="intro-card-progress"></div>
        <button type="button" class="bge-btn bge-btn-small bge-btn-primary intro-card-btn">next</button>
      </div>
    </div>
  </div>

  <!-- Death cutscene overlay (dynasty mode) -->
  <div id="death-cutscene" class="death-cutscene hidden" role="status" aria-live="assertive">
    <div class="death-cutscene-inner">
      <div class="death-name" id="death-name"></div>
      <div class="death-meta" id="death-meta"></div>
      <div class="death-poem" id="death-poem"></div>
    </div>
  </div>

  <!-- Player HUD (dynasty mode — bottom-center) -->
  <div id="player-hud" class="player-hud hidden" role="status" aria-label="your gator status">
    <canvas id="player-portrait" class="player-portrait" width="28" height="14" aria-hidden="true"></canvas>
    <div class="player-hud-info">
      <div class="player-hud-goal" id="player-hud-goal"></div>
      <div class="player-hud-name" id="player-hud-name"></div>
      <div class="player-hud-bars">
        <div class="player-bar-row"><span class="player-bar-label">hunger</span><div class="player-bar-track"><div class="player-bar-fill player-bar-hunger" id="hud-bar-hunger"></div></div></div>
        <div class="player-bar-row"><span class="player-bar-label">energy</span><div class="player-bar-track"><div class="player-bar-fill player-bar-energy" id="hud-bar-energy"></div></div></div>
        <div class="player-bar-row"><span class="player-bar-label">health</span><div class="player-bar-track"><div class="player-bar-fill player-bar-health" id="hud-bar-health"></div></div></div>
      </div>
      <div class="player-hud-action" id="player-hud-action"></div>
    </div>
  </div>

  <!-- Hover tooltip (dynasty mode) -->
  <div id="hover-tooltip" class="hover-tooltip hidden" aria-hidden="true"></div>

  <!-- Gazette toggle button + side panel -->
  <button type="button" id="obituary-toggle" aria-label="Toggle The Swamp Gazette" aria-expanded="false" aria-controls="obituary-panel">Gazette</button>
  <aside id="obituary-panel" class="hidden" role="complementary" aria-label="The Swamp Gazette">
    <!-- populated by renderObituaryPanel in obituary.js -->
  </aside>

  <!-- Family tree toggle + overlay (dynasty mode only) -->
  <button type="button" id="family-tree-toggle" class="hidden" aria-label="Open family tree" aria-controls="family-tree-overlay">family</button>
  <div id="family-tree-overlay" class="bge-overlay hidden" role="dialog" aria-labelledby="family-tree-title" aria-modal="true">
    <div class="bge-card family-tree-card">
      <!-- corner doodle: coral sparkle -->
      <svg class="bge-doodle bge-doodle-tr" aria-hidden="true" viewBox="0 0 20 20" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10" cy="10" r="3" fill="#cc6644" opacity="0.8"/>
        <line x1="10" y1="1" x2="10" y2="5"  stroke="#cc6644" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
        <line x1="10" y1="15" x2="10" y2="19" stroke="#cc6644" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
        <line x1="1"  y1="10" x2="5"  y2="10" stroke="#cc6644" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
        <line x1="15" y1="10" x2="19" y2="10" stroke="#cc6644" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
        <line x1="3.5" y1="3.5" x2="6.5" y2="6.5"   stroke="#cc6644" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
        <line x1="13.5" y1="13.5" x2="16.5" y2="16.5" stroke="#cc6644" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
        <line x1="16.5" y1="3.5" x2="13.5" y2="6.5"  stroke="#cc6644" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
        <line x1="6.5" y1="13.5" x2="3.5" y2="16.5"  stroke="#cc6644" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      </svg>
      <div class="family-tree-header">
        <h2 id="family-tree-title">family</h2>
        <div id="family-tree-stats"></div>
      </div>
      <div id="family-tree-body" class="family-tree-body"></div>
      <button type="button" class="bge-btn bge-btn-small" id="family-tree-close">close</button>
    </div>
  </div>

  <div id="rotate-prompt" role="alert">
    <div id="rotate-icon" aria-hidden="true">&#8635;</div>
    <div id="rotate-text">rotate your device</div>
  </div>

  <div id="sim-controls" aria-label="simulation controls">
    <button type="button" id="sim-pause-btn" aria-label="pause or resume simulation">pause</button>
    <button type="button" id="sim-speed-btn" aria-label="cycle simulation speed">1x</button>
  </div>

  <noscript>
    <p style="color:#6a8a5a;font-family:monospace;padding:1em;">
      Big Gator Energy needs JavaScript to run — the simulator is entirely client-side.
    </p>
  </noscript>
  <script type="module" src="js/main.js?v=20260508-batch3"></script>
</body>
</html>
