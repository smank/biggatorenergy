server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Gzip
    gzip on;
    gzip_comp_level 5;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_vary on;
    gzip_min_length 256;

    # index.html — always revalidate so deploys propagate immediately.
    # Any `add_header` in a location block overrides ALL inherited headers in
    # nginx, so every location that adds one must re-add the full security set.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; media-src 'self'; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    }

    # Static assets — short TTL with revalidation (no content-hash cache busting)
    # Use add_header only; `expires` emits a duplicate Cache-Control.
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=600, must-revalidate, no-transform" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; media-src 'self'; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    }

    # Server-level defaults (inherited by any location that doesn't use add_header)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; media-src 'self'; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # SPA-like routing — try file, then directory, then fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
