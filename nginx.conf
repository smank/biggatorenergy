server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Gzip
    gzip on;
    gzip_comp_level 5;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_vary on;
    gzip_min_length 256;

    # Security headers (applied globally via `always`)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # CSP: self-only scripts/styles; data: for the emoji-SVG favicon; blob: for audio worklets (none used today, kept for safety)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; media-src 'self'; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # index.html — always revalidate so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Static assets — short TTL with revalidation (no hash-based cache busting in place)
    location ~* \.(js|css)$ {
        expires 10m;
        add_header Cache-Control "public, must-revalidate, no-transform" always;
    }

    # SPA-like routing — try file, then directory, then fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
